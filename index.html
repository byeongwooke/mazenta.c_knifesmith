<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mazenta.c_knifesmith — Enter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Variables */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --magenta: #e0006e; --black: #000000; --white: #ffffff; --mono: 'Space Mono', monospace; --serif: 'IM Fell English', serif; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--black); }

    /* Main Entry Layer [cite: 78, 93] */
    #Main_Entry { position: fixed; inset: 0; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.6rem; z-index: 1; }
    #logo { font-family: var(--serif); font-size: clamp(1.6rem, 4vw, 2.8rem); color: var(--magenta); -webkit-text-stroke: 1px var(--black); text-align: center; opacity: 0; transform: translateY(12px); animation: riseIn 1s ease forwards; animation-delay: 0.3s; }
    #cta-btn { font-family: var(--mono); font-size: 0.8rem; color: #FFFFFF; background: #000000; border: none; padding: 0.85rem 2.6rem; cursor: pointer; opacity: 0; animation: fadeIn 0.8s ease forwards; animation-delay: 0.9s; }

    /* Loading Overlay Layer [cite: 70, 93] */
    #Loading_Overlay { position: fixed; inset: 0; background: #000000; z-index: 999; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #loading-text {
      font-family: var(--mono);
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #FFFFFF;
      border-right: 2px solid #FFFFFF;
      position: relative;
      z-index: 10;
    }
    #Center_Line { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: #FFFFFF; transform: translateY(-50%) scaleX(0); }
    #Top_Panel, #Bottom_Panel { position: absolute; left: 0; right: 0; height: 50%; background: #000000; transition: transform 1s ease-in-out; }
    #Top_Panel { top: 0; } #Bottom_Panel { bottom: 0; }
    #Top_Panel.open { transform: translateY(-100%); } #Bottom_Panel.open { transform: translateY(100%); }
    .line-expand { animation: lineExpand 0.22s ease forwards; }
    @keyframes lineExpand { to { transform: translateY(-50%) scaleX(1); } }
    @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes caretBlink { 0%, 100% { border-right-color: #FFFFFF; } 50% { border-right-color: transparent; } }
  </style>
</head>
<body>
  <div id="Main_Entry">
    <h1 id="logo">@mazenta.c_knifesmith<br><span style="font-size:0.32em; font-family:var(--mono); color:var(--black); -webkit-text-stroke:0;">작가 정득묵</span></h1>
    <button id="cta-btn">바로가기</button>
  </div>
  <div id="Loading_Overlay">
    <div id="Top_Panel"></div>
    <div id="Center_Line"></div>
    <div id="Bottom_Panel"></div>
    <span id="loading-text"></span>
  </div>

  <script>
    const FULL_TEXT = 'Loding...'; // [cite: 66, 95]
    const CHAR_DELAY = 100; // 0.1s [cite: 66, 95]
    const TOTAL_HOLD = 5000; // 5s [cite: 66, 95, 237, 243]
    const loadingEl = document.getElementById('loading-text');
    let charIndex = 0;

    function typeChar() {
      if (charIndex < FULL_TEXT.length) {
        loadingEl.textContent += FULL_TEXT[charIndex];
        charIndex++;
        setTimeout(typeChar, CHAR_DELAY);
      } else { loadingEl.style.animation = 'caretBlink 0.7s step-end infinite'; }
    }

    function startShoji() { // [cite: 76, 96, 97, 117]
      loadingEl.style.opacity = '0';
      document.getElementById('Center_Line').classList.add('line-expand');
      setTimeout(() => {
        document.getElementById('Top_Panel').classList.add('open');
        document.getElementById('Bottom_Panel').classList.add('open');
        setTimeout(() => { document.getElementById('Loading_Overlay').style.display = 'none'; }, 1100);
      }, 240);
    }

    document.addEventListener('DOMContentLoaded', () => { // [cite: 236, 245, 247]
      typeChar();
      setTimeout(startShoji, TOTAL_HOLD); // 5s fixed timing [cite: 237, 243, 248]
    });
  </script>
</body>
</html>
