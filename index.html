<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mazenta.c_knifesmith — Enter</title>
  <meta name="description" content="mazenta.c_knifesmith — 30년의 기록, 날의 철학. 금속 작가의 공간으로 입장하십시오." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet" />
  <style>
    /* ─── Reset ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --magenta: #e0006e;
      --magenta-hover: #ff1493;
      --black: #000000;
      --white: #ffffff;
      --mono: 'Space Mono', monospace;
      --serif: 'IM Fell English', serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--black);
    }

    /* ═══════════════════════════════════════════════════════
       [Main_Entry] — Command 1: Base Layer, #FFFFFF, Z:1
    ═══════════════════════════════════════════════════════ */
    #Main_Entry {
      position: fixed;
      inset: 0;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.6rem;
      z-index: 1;
    }

    /* Corner framing marks */
    #Main_Entry::before,
    #Main_Entry::after {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      border-color: rgba(0, 0, 0, 0.12);
      border-style: solid;
    }

    #Main_Entry::before {
      top: 2rem;
      left: 2rem;
      border-width: 1px 0 0 1px;
    }

    #Main_Entry::after {
      bottom: 2rem;
      right: 2rem;
      border-width: 0 1px 1px 0;
    }

    /* Vertical brand-rule decorations */
    .brand-rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.3) 40%, transparent);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.5s;
    }

    .brand-rule.bottom {
      animation-delay: 0.7s;
    }

    /* ── Command 8: Logo ──
       Text_Fill_Color: Magenta, Text_Stroke: 1px Black
       Font: IM Fell English (Serif) — artist identity
    */
    #logo {
      font-family: var(--serif);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      letter-spacing: 0.05em;
      color: var(--magenta);
      -webkit-text-stroke: 1px var(--black);
      text-stroke: 1px var(--black);
      text-align: center;
      line-height: 1.3;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.3s;
      user-select: none;
    }

    #logo .sub {
      display: block;
      font-family: var(--mono);
      font-size: 0.32em;
      letter-spacing: 0.28em;
      color: var(--black);
      -webkit-text-stroke: 0px;
      text-stroke: 0px;
      font-style: normal;
      margin-top: 0.7em;
      opacity: 0.45;
      text-transform: uppercase;
    }

    /* ── Command 9: CTA Button ──
       Background: #000000, Text_Color: #FFFFFF
       Hover: Background: Magenta, Text_Color: #FFFFFF
    */
    #cta-btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #FFFFFF;
      background: #000000;
      border: none;
      padding: 0.85rem 2.6rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      outline: none;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.9s;
      transition: color 0.35s ease;
    }

    /* Magenta fill slides in from left on hover */
    #cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--magenta);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #cta-btn:hover::before,
    #cta-btn:focus-visible::before {
      transform: translateX(0);
    }

    #cta-btn:hover,
    #cta-btn:focus-visible {
      color: #FFFFFF;
    }

    #cta-btn span {
      position: relative;
      z-index: 1;
    }

    /* Keyframes */
    @keyframes riseIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* ═══════════════════════════════════════════════════════
       [Loading_Overlay] — Command 2: #000000, Z-index: 999
    ═══════════════════════════════════════════════════════ */
    #Loading_Overlay {
      position: fixed;
      inset: 0;
      background: #000000;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Command 3 & 4: Typing Text ──
       "Loding...", Font_Color: #FFFFFF, Monospace (mechanical/modern)
       Typing_Effect Interval: 0.1s, Start: On_Load
    */
    #loading-text {
      font-family: var(--mono);
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #FFFFFF;
      letter-spacing: 0.1em;
      white-space: nowrap;
      /* Caret effect */
      border-right: 2px solid #FFFFFF;
    }

    /* ── Command 6: Horizontal boundary line at Screen_Center ── */
    #Center_Line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #FFFFFF;
      transform: translateY(-50%) scaleX(0);
      transform-origin: center;
      will-change: transform;
    }

    /* ── Command 7: Split panels — Top_Panel & Bottom_Panel ── */
    #Top_Panel,
    #Bottom_Panel {
      position: absolute;
      left: 0;
      right: 0;
      height: 50%;
      background: #000000;
      will-change: transform;
    }

    #Top_Panel {
      top: 0;
      transform: translateY(0);
    }

    #Bottom_Panel {
      bottom: 0;
      transform: translateY(0);
    }

    /* Open states: TranslateY(-100%) and TranslateY(100%) */
    #Top_Panel.open {
      transform: translateY(-100%);
    }

    #Bottom_Panel.open {
      transform: translateY(100%);
    }

    /* Ease-in-out, Duration: 1s */
    .panel-transition {
      transition: transform 1s ease-in-out;
    }

    /* Center line expand animation */
    .line-expand {
      animation: lineExpand 0.22s ease forwards;
    }

    @keyframes lineExpand {
      from {
        transform: translateY(-50%) scaleX(0);
      }

      to {
        transform: translateY(-50%) scaleX(1);
      }
    }

    /* Caret blink keyframe (injected by JS after typing) */

    /* ── Grain texture (subtle premium texture) ── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════
       LAYER 1 — [Main_Entry]  Background: #FFFFFF
  ══════════════════════════════════════════ -->
  <div id="Main_Entry" aria-label="mazenta.c_knifesmith 브랜드 메인 진입 화면">
    <div class="brand-rule" aria-hidden="true"></div>

    <!-- Command 8: Logo — Magenta fill, 1px Black stroke, Serif font -->
    <h1 id="logo">
      @mazenta.c_knifesmith
      <span class="sub">작가 정득묵</span>
    </h1>

    <div class="brand-rule bottom" aria-hidden="true"></div>

    <!-- Command 9: [바로가기] Button -->
    <button id="cta-btn" type="button" aria-label="작품 공간으로 바로가기">
      <span>바로가기</span>
    </button>
  </div>

  <!-- Subtle grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════
       LAYER 2 — [Loading_Overlay]  #000000  Z:999
  ══════════════════════════════════════════ -->
  <div id="Loading_Overlay" role="status" aria-live="polite" aria-label="로딩 중">
    <!-- Command 7: Shoji panels -->
    <div id="Top_Panel" aria-hidden="true"></div>
    <div id="Center_Line" aria-hidden="true"></div>
    <div id="Bottom_Panel" aria-hidden="true"></div>

    <!-- Command 3: "Loding..." text at center, White -->
    <span id="loading-text" aria-label="Loding..."></span>
  </div>

  <script>
    // ════════════════════════════════════════════════════════
    //  METAL SCRAPE SOUND — Web Audio API synthesis
    //  Triggered at Phase-2 start (shoji opening)
    //  "청각적으로 '금속 작가의 공간'임을 즉각 인지"
    // ════════════════════════════════════════════════════════
    function playMetalScrape() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const dur = 0.6; // seconds
        const sr = ctx.sampleRate;
        const buf = ctx.createBuffer(1, sr * dur, sr);
        const data = buf.getChannelData(0);

        for (let i = 0; i < sr * dur; i++) {
          const t = i / sr;
          // Convex decay envelope — sharp attack, smooth tail
          const env = Math.pow(1 - t / dur, 2.6);
          // Broadband noise (the "scrape" body)
          const noise = (Math.random() * 2 - 1);
          // Resonant metallic overtones
          const tone1 = Math.sin(2 * Math.PI * 1800 * t) * 0.14;
          const tone2 = Math.sin(2 * Math.PI * 3400 * t) * 0.07;
          const tone3 = Math.sin(2 * Math.PI * 5200 * t) * 0.04;
          data[i] = (noise * 0.65 + tone1 + tone2 + tone3) * env * 0.5;
        }

        const src = ctx.createBufferSource();
        src.buffer = buf;

        // High-pass filter: strip low rumble, keep metallic shimmer
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass';
        hpf.frequency.value = 880;
        hpf.Q.value = 1.4;

        const gain = ctx.createGain();
        gain.gain.value = 0.45;

        src.connect(hpf);
        hpf.connect(gain);
        gain.connect(ctx.destination);
        src.start();
        src.stop(ctx.currentTime + dur);
        src.onended = () => ctx.close();
      } catch (e) {
        // Fail silently if AudioContext unavailable
      }
    }

    // ════════════════════════════════════════════════════════
    //  PHASE 1 — Typing animation  (0s → ~5s)
    //  Command 3 & 4: "Loding..." typed at 0.1s/char
    //  Command 5: Maintain Loading_Overlay for 5.0s total
    // ════════════════════════════════════════════════════════
    const FULL_TEXT = 'Loding...';   // intentional per spec
    const CHAR_DELAY = 100;           // 0.1s per character
    const TOTAL_HOLD = 5000;          // 5.0s total hold

    const loadingEl = document.getElementById('loading-text');
    const overlay = document.getElementById('Loading_Overlay');
    const topPanel = document.getElementById('Top_Panel');
    const botPanel = document.getElementById('Bottom_Panel');
    const centerLine = document.getElementById('Center_Line');

    // Inject caret blink keyframe
    const blinkStyle = document.createElement('style');
    blinkStyle.textContent = `
      @keyframes caretBlink {
        0%, 100% { border-right-color: #FFFFFF; }
        50%       { border-right-color: transparent; }
      }
    `;
    document.head.appendChild(blinkStyle);

    let charIndex = 0;

    function typeChar() {
      if (charIndex < FULL_TEXT.length) {
        loadingEl.textContent += FULL_TEXT[charIndex];
        charIndex++;
        setTimeout(typeChar, CHAR_DELAY);
      } else {
        // Typing complete — activate caret blink
        loadingEl.style.animation = 'caretBlink 0.7s step-end infinite';

        // Command 5: Wait out remaining hold time before Phase-2
        const typedDuration = FULL_TEXT.length * CHAR_DELAY;
        const remaining = Math.max(0, TOTAL_HOLD - typedDuration - 250);
        setTimeout(startShoji, remaining);
      }
    }

    // ════════════════════════════════════════════════════════
    //  PHASE 2 — Shoji (障子) door opening animation
    //  Command 6: Draw Horizontal_Line (White) at Screen_Center
    //  Command 7: Split → TranslateY(±100%), 1s ease-in-out
    // ════════════════════════════════════════════════════════
    function startShoji() {
      // 1. Trigger metal scrape sound at the exact moment of split
      playMetalScrape();

      // 2. Fade out loading text
      loadingEl.style.transition = 'opacity 0.25s ease';
      loadingEl.style.opacity = '0';

      // 3. Reveal the white center boundary line (Command 6)
      centerLine.classList.add('line-expand');

      // 4. After line draws, slide panels open (Command 7)
      setTimeout(() => {
        topPanel.classList.add('panel-transition', 'open');
        botPanel.classList.add('panel-transition', 'open');

        // 5. After panels clear, fade and remove overlay
        setTimeout(() => {
          overlay.style.transition = 'opacity 0.4s ease';
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.style.display = 'none';
            overlay.setAttribute('aria-hidden', 'true');
          }, 420);
        }, 1060); // panels take 1s
      }, 240);
    }

    // ════════════════════════════════════════════════════════
    //  BOOT — Start typing on page load (Command 4: On_Load)
    // ════════════════════════════════════════════════════════
    window.addEventListener('load', () => {
      setTimeout(typeChar, 300); // brief initial pause for polish
    });

    // ── CTA button handler ──
    document.getElementById('cta-btn').addEventListener('click', () => {
      // Replace '#' with the target destination URL when ready
      window.location.href = '#';
    });
  </script>
</body>

</html>
